<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحت الصيانة | MOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .gear { font-size: 80px; animation: spin 4s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="gear">⚙️</div>
        <h1 class="text-3xl font-black text-cyan-400 mt-6">النظام تحت التحديث</h1>
        <p class="text-gray-500 mt-2">نحن نطور المنصة لنقدم لك أفضل تجربة. سنعود قريباً!</p>
    </div>
    <script>
        setInterval(() => {
            if (localStorage.getItem('siteMaintenance') !== 'true') window.location.href = 'index.html';
        }, 3000);
    </script>
</body>
</html>
