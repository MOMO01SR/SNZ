<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | الباقات والاشتراكات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .plan-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .plan-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .locked-plan { filter: grayscale(0.8); opacity: 0.7; pointer-events: none; }
        .modal-overlay { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .feature-item::before { content: '✓'; color: #06b6d4; margin-left: 8px; font-size: 10px; }
        .bottom-nav { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-cyan-500 animate-spin opacity-80"></div>
            <div class="absolute inset-3 rounded-full border-b-2 border-l-2 border-purple-500 animate-[spin_1.5s_reverse_infinite] opacity-60"></div>
            <span class="text-xl font-black text-white tracking-widest z-10">SNZ</span>
        </div>
        <div class="text-[9px] text-cyan-400 font-mono uppercase tracking-[0.2em] animate-pulse">FETCHING SUBSCRIPTION PROTOCOLS...</div>
    </div>

    <div id="toastContainer" class="fixed top-12 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="pt-6 px-6 mb-6 relative z-10">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 tracking-wider">مستويات الوصول</h2>
                <p class="text-[10px] text-gray-400 font-mono mt-1">Upgrade Your Trading Node</p>
            </div>
            <div class="text-left bg-black/40 border border-white/5 p-2 rounded-xl">
                <p class="text-[8px] text-gray-500 uppercase tracking-widest mb-1">الرصيد المتاح</p>
                <p class="text-sm font-black text-green-400 font-mono">$<span id="currentBalance">0.00</span></p>
            </div>
        </div>
        
        <div class="bg-cyan-500/10 border border-cyan-500/30 rounded-xl p-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl animate-pulse">🛡️</span>
                <div>
                    <p class="text-[9px] text-cyan-400 uppercase font-bold tracking-wider">الباقة الحالية</p>
                    <p class="text-sm font-black text-white" id="currentPlanName">جاري المزامنة...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="px-4 mb-24 relative z-10 space-y-6" id="plansContainer"></div>

    <div id="purchaseModal" class="fixed inset-0 z-[80] modal-overlay hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="glass-card w-[85%] max-w-sm p-6 transform scale-95 transition-transform duration-300 border-t-4 border-purple-500 bg-[#0f172a] rounded-2xl" id="modalContent">
            <h3 class="text-lg font-black text-white mb-2 text-center">تأكيد الترقية</h3>
            <p class="text-xs text-gray-400 text-center mb-6 leading-relaxed">هل أنت متأكد من ترقية عقدتك إلى مستوى <span id="modalPlanName" class="text-purple-400 font-bold">--</span>؟</p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400 bg-white/5 border border-white/5">إلغاء</button>
                <button onclick="confirmPurchase()" id="confirmBtn" class="flex-1 py-3 rounded-xl text-xs font-black text-white bg-gradient-to-r from-purple-600 to-cyan-600">تأكيد</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 z-50 pb-safe">
        <div class="flex justify-around items-center p-3">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-95 transition-all">
                <span class="text-lg">📈</span><span class="text-[9px]">التداول</span>
            </button>
            <div class="flex flex-col items-center gap-1 text-purple-400 relative">
                <div class="absolute inset-0 bg-purple-500/20 rounded-full scale-150 blur-md -z-10 animate-pulse"></div>
                <span class="text-lg drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]">💼</span>
                <span class="text-[9px] font-bold">الباقات</span>
            </div>
            <button onclick="location.href='team.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-95 transition-all">
                <span class="text-lg">👥</span><span class="text-[9px]">الفريق</span>
            </button>
            <button onclick="location.href='account.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white active:scale-95 transition-all">
                <span class="text-lg">⚙️</span><span class="text-[9px]">حسابي</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        let userBalance = 0;
        let userEmail = localStorage.getItem('currentUserEmail') || "architect@local.dev";

        window.addEventListener('load', async () => {
            await loadUserData();
            await loadPlans();
            setTimeout(() => {
                document.getElementById('ultimateLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('ultimateLoader').style.display = 'none', 500);
            }, 800);
        });

        async function loadUserData() {
            const { data } = await _supabase.from('users').select('balance, plan').eq('email', userEmail).single();
            if(data) {
                userBalance = data.balance;
                document.getElementById('currentBalance').innerText = userBalance.toFixed(2);
                document.getElementById('currentPlanName').innerText = data.plan;
            }
        }

        async function loadPlans() {
            const container = document.getElementById('plansContainer');
            // هنا يتم جلب الباقات من جدول subscription_plans الذي أنشأناه في Supabase
            const { data: plans } = await _supabase.from('subscription_plans').select('*').order('price', {ascending: true});
            
            if(plans) {
                container.innerHTML = plans.map(plan => `
                    <div class="glass-card p-6 border-t-4 border-white/10 bg-[#0f172a] rounded-2xl">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-black text-white">${plan.name}</h3>
                            <p class="text-xl font-black text-cyan-400">$${plan.price}</p>
                        </div>
                        <button onclick="openModal('${plan.id}', '${plan.name}', ${plan.price})" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 py-3 rounded-xl text-xs font-black">ترقية الآن</button>
                    </div>
                `).join('');
            }
        }

        function openModal(id, name, price) {
            document.getElementById('modalPlanName').innerText = name;
            document.getElementById('purchaseModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('purchaseModal').style.opacity = '1', 10);
        }

        function closeModal() {
            document.getElementById('purchaseModal').style.opacity = '0';
            setTimeout(() => document.getElementById('purchaseModal').classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
