<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | شبكة الفريق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; padding-bottom: 90px; padding-top: 35px; min-height: 100dvh; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(168, 85, 247, 0.15); backdrop-filter: blur(20px); border-radius: 2rem; }
        .cyber-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #a855f7; font-family: monospace; font-weight: bold; }
        .bottom-nav { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(2, 6, 23, 0.95); border-bottom: 1px solid rgba(168, 85, 247, 0.2); position: fixed; top: 0; z-index: 40; height: 32px; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker 35s linear infinite; }
        .team-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .team-row:hover { background: rgba(168, 85, 247, 0.05); transform: translateX(-5px); border-right: 2px solid #a855f7; }
    </style>
</head>
<body>

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-purple-500 animate-spin"></div>
            <span class="text-xl font-black text-white tracking-widest">SNZ</span>
        </div>
        <div class="text-[9px] text-purple-400 font-mono tracking-[0.3em] uppercase animate-pulse">SYNCING NETWORK NODES...</div>
    </div>

    <div class="ticker-wrap flex items-center">
        <div class="ticker-content gap-12 text-[10px] font-mono">
            <span class="text-purple-400 font-bold">REFERRAL COMMISSION PROGRAM ACTIVE</span>
            <span class="text-cyan-400 font-bold">INVITE FRIENDS TO EARN UP TO 15%</span>
            <span class="text-green-400 font-bold">NETWORK SYNCED SUCCESSFULLY</span>
        </div>
    </div>

    <div id="toastContainer" class="fixed top-12 left-1/2 -translate-x-1/2 w-[90%] z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="pt-4 px-6 flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-cyan-500 p-[2px]">
                <div class="w-full h-full rounded-full bg-[#050a14] flex items-center justify-center">👥</div>
            </div>
            <div>
                <h3 class="font-black text-sm text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 uppercase tracking-widest">شبكة الإحالة</h3>
                <p class="text-[9px] text-gray-400 font-mono">Elite Affiliate Network</p>
            </div>
        </div>
    </div>

    <div class="px-4 mb-6">
        <div class="glass-card p-6 border-t-4 border-purple-500 text-center">
            <h3 class="text-[11px] text-gray-300 font-bold uppercase mb-4 tracking-widest">كود الدعوة الخاص بك (ID)</h3>
            <div class="flex items-center gap-2 bg-black/50 p-2 rounded-2xl border border-white/5 shadow-inner">
                <input type="text" id="myReferralCode" readonly value="SYNCING..." class="w-full bg-transparent text-center outline-none text-sm font-black text-purple-400 tracking-widest">
                <button onclick="copyReferralCode()" class="bg-gradient-to-r from-purple-600 to-purple-500 text-white text-[10px] font-bold px-5 py-3 rounded-xl active:scale-95 shadow-lg">نسخ 📋</button>
            </div>
        </div>
    </div>

    <div class="px-4 mb-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 text-center border-b-2 border-cyan-500">
                <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">أعضاء الفريق</p>
                <div class="text-3xl font-black text-white"><span id="teamCount">0</span> 👤</div>
            </div>
            <div class="glass-card p-5 text-center border-b-2 border-green-500">
                <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">أرباح الفريق</p>
                <div class="text-2xl font-black text-green-400">$<span id="teamProfit">0.00</span></div>
            </div>
        </div>
    </div>

    <div class="px-4 mb-6">
        <div class="glass-card p-5">
            <h3 class="text-xs font-black text-white mb-4 border-b border-white/5 pb-3">📋 سجل الأعضاء المباشرين</h3>
            <div id="teamListContainer" class="space-y-2 max-h-[300px] overflow-y-auto">
                <p class="text-center py-6 text-gray-500 text-[10px]">جاري فحص الشبكة...</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 z-50 pb-safe">
        <div class="flex justify-around items-center p-3">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">📈</span><span class="text-[9px]">التداول</span>
            </button>
            <button onclick="location.href='plans.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">💼</span><span class="text-[9px]">الباقات</span>
            </button>
            <div class="flex flex-col items-center gap-1 text-purple-400 relative">
                <div class="absolute inset-0 bg-purple-500/20 rounded-full scale-150 blur-md -z-10 animate-pulse"></div>
                <span class="text-lg drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]">👥</span><span class="text-[9px] font-bold">الفريق</span>
            </div>
            <button onclick="location.href='account.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">⚙️</span><span class="text-[9px]">حسابي</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        let userEmail = localStorage.getItem('currentUserEmail') || "architect@local.dev";

        window.addEventListener('load', async () => {
            await loadTeamData();
            setTimeout(() => {
                document.getElementById('ultimateLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('ultimateLoader').style.display = 'none', 700);
            }, 1000);
        });

        async function loadTeamData() {
            const { data: user } = await _supabase.from('users').select('uid, team_profit').eq('email', userEmail).single();
            if(user) {
                document.getElementById('myReferralCode').value = user.uid;
                document.getElementById('teamProfit').innerText = (user.team_profit || 0).toFixed(2);

                const { data: members } = await _supabase.from('users').select('email, plan').eq('referral', user.uid);
                document.getElementById('teamCount').innerText = members ? members.length : 0;

                const container = document.getElementById('teamListContainer');
                if(members && members.length > 0) {
                    container.innerHTML = members.map(m => `
                        <div class="team-row flex justify-between items-center p-3">
                            <span class="text-[10px] font-mono">${m.email.substring(0,3)}***@${m.email.split('@')[1]}</span>
                            <span class="text-[8px] bg-purple-500/20 text-purple-400 px-2 py-1 rounded font-bold">${m.plan}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p class="text-center py-6 text-gray-600 text-[9px]">لا يوجد أعضاء في فريقك حالياً</p>`;
                }
            }
        }

        function copyReferralCode() {
            const code = document.getElementById('myReferralCode');
            navigator.clipboard.writeText(code.value);
            alert("تم النسخ!");
        }
    </script>
</body>
</html>
