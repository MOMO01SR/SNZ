<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | المركز الرئيسي للتداول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. إعدادات التصميم المتطور (Cyber-Glass UI) */
        :root { --main-cyan: #06b6d4; --main-purple: #a855f7; --dark-bg: #020617; }
        
        body { 
            background: var(--dark-bg); 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100dvh; 
            overflow-x: hidden; 
            user-select: none; 
            -webkit-user-select: none; 
            padding-bottom: 110px; 
            padding-top: 20px;
        }

        .glass-panel { 
            background: rgba(15, 23, 42, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-radius: 2rem; 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .cyber-input { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            color: var(--main-cyan); 
            font-family: monospace; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .cyber-input:focus { 
            border-color: var(--main-purple); 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); 
            outline: none; 
            transform: translateY(-1px);
        }

        /* 2. حركات الأنيميشن المتقدمة */
        @keyframes pulse-glow { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .price-up { color: #4ade80; animation: glow-green 1.5s infinite alternate; }
        .price-down { color: #f87171; animation: glow-red 1.5s infinite alternate; }
        
        @keyframes glow-green { from { text-shadow: 0 0 5px #4ade80; } to { text-shadow: 0 0 15px #4ade80; } }
        @keyframes glow-red { from { text-shadow: 0 0 5px #f87171; } to { text-shadow: 0 0 15px #f87171; } }

        /* 3. منزلقة الاستثمار المخصصة */
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: var(--main-cyan); border: 4px solid var(--dark-bg); 
            box-shadow: 0 0 15px var(--main-cyan);
        }

        /* 4. شريط التنقل السفلي الاحترافي */
        .bottom-nav { 
            background: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255,255,255,0.05); 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: #64748b; transition: 0.3s; }
        .nav-item.active { color: var(--main-cyan); }
    </style>
</head>
<body>

    <div id="alertStack" class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <header class="px-5 mb-8 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-700 flex items-center justify-center shadow-lg shadow-cyan-900/40 border border-white/10">
                <span class="text-white font-black text-xl italic tracking-tighter">S</span>
            </div>
            <div>
                <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-0.5">مركز التداول الرقمي</h2>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                    <span id="userIdentity" class="text-xs font-mono text-cyan-400 font-bold uppercase tracking-tight">Syncing...</span>
                </div>
            </div>
        </div>
        <button onclick="logout()" class="p-3 rounded-2xl bg-white/5 border border-white/5 hover:bg-red-500/10 transition-all active:scale-90">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </header>

    <section class="px-5 mb-10">
        <div class="glass-panel p-7 relative overflow-hidden border-t-2 border-cyan-500/20">
            <div class="flex justify-between items-start relative z-10 mb-8">
                <div>
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">إجمالي السيولة (USDT)</p>
                    <h1 class="text-5xl font-black text-white tracking-tight leading-none">$<span id="mainBalance">0.00</span></h1>
                </div>
                <div class="text-right">
                    <div id="planContainer" class="px-4 py-2 rounded-xl bg-cyan-500/10 border border-cyan-500/30">
                        <span id="currentPlan" class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">LOADING</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 relative z-10">
                <button onclick="window.location.href='deposit.html'" class="py-4 px-2 rounded-2xl bg-cyan-600 hover:bg-cyan-500 transition-all font-black text-xs uppercase tracking-widest shadow-xl shadow-cyan-900/40">إيداع فوري</button>
                <button onclick="window.location.href='withdraw.html'" class="py-4 px-2 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all font-black text-xs uppercase tracking-widest">سحب الأرباح</button>
            </div>
        </div>
    </section>

    <section class="px-5 mb-10">
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.25em]">Binance Oracle Feed</h3>
            <span class="text-[9px] font-mono text-green-500 bg-green-500/10 px-2 py-1 rounded">LIVE 5ms</span>
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-panel p-4 text-center border-white/5">
                <p class="text-[9px] font-bold text-gray-500 mb-2 uppercase">BTC</p>
                <p id="price-btc" class="text-sm font-black font-mono tracking-tighter">$---</p>
            </div>
            <div class="glass-panel p-4 text-center border-white/5">
                <p class="text-[9px] font-bold text-gray-500 mb-2 uppercase">ETH</p>
                <p id="price-eth" class="text-sm font-black font-mono tracking-tighter">$---</p>
            </div>
            <div class="glass-panel p-4 text-center border-white/5">
                <p class="text-[9px] font-bold text-gray-500 mb-2 uppercase">SOL</p>
                <p id="price-sol" class="text-sm font-black font-mono tracking-tighter">$---</p>
            </div>
        </div>
    </section>

    <section class="px-5 mb-10">
        <div class="glass-panel p-7 border-b-4 border-purple-600 shadow-purple-900/20">
            <h3 class="text-sm font-black text-white mb-8 flex items-center gap-3">
                <span class="w-2 h-6 bg-purple-600 rounded-full"></span>
                عقود التداول الذكية
            </h3>

            <div class="space-y-8">
                <div>
                    <div class="flex justify-between mb-4 px-1">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">حجم العقد (Margin)</label>
                        <span class="text-sm font-black text-cyan-400 font-mono">$<span id="valDisplay">30</span></span>
                    </div>
                    <input type="range" id="investAmount" min="30" max="120" step="10" value="30" oninput="updateUI()">
                    <div class="flex justify-between mt-3 text-[9px] text-gray-600 font-bold uppercase font-mono">
                        <span>$30</span>
                        <span>$120</span>
                    </div>
                </div>

                <div class="relative group">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 block">Signal Code Authentication</label>
                    <input type="text" id="signalInput" placeholder="أدخل مفتاح التشفير..." class="w-full cyber-input p-5 rounded-2xl text-sm font-black tracking-[0.3em] text-center uppercase">
                </div>

                <button onclick="executeTrade()" id="tradeBtn" class="w-full bg-gradient-to-r from-cyan-600 via-purple-600 to-cyan-600 bg-[length:200%_auto] hover:bg-right py-5 rounded-2xl font-black text-white uppercase tracking-widest transition-all duration-700 active:scale-95 shadow-2xl shadow-purple-950/40">
                    <span id="tradeBtnText">Authenticate Contract</span>
                </button>
            </div>
        </div>
    </section>

    <nav class="bottom-nav h-20 flex justify-around items-center px-6">
        <button onclick="location.reload()" class="nav-item active">
            <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>HOME</span>
        </button>
        <button onclick="window.location.href='plans.html'" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>PLANS</span>
        </button>
        <button onclick="window.location.href='team.html'" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>TEAM</span>
        </button>
        <button onclick="window.location.href='account.html'" class="nav-item">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>ACCOUNT</span>
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        let userEmail = localStorage.getItem('currentUserEmail');
        let currentBalance = 0;
        let isProcessing = false;

        function pushAlert(msg, type = 'error') {
            const stack = document.getElementById('alertStack');
            const alert = document.createElement('div');
            const style = type === 'error' ? 'bg-red-950/90 border-red-500 text-red-400' : 'bg-cyan-950/90 border-cyan-500 text-cyan-400';
            alert.className = `p-4 rounded-2xl border-2 backdrop-blur-xl shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in slide-in-from-top ${style}`;
            alert.innerText = msg;
            stack.appendChild(alert);
            setTimeout(() => { alert.classList.add('animate-out', 'fade-out'); setTimeout(() => alert.remove(), 500); }, 4000);
        }

        function updateUI() {
            document.getElementById('valDisplay').innerText = document.getElementById('investAmount').value;
        }

        async function syncData() {
            if (!userEmail) return window.location.replace('index.html');
            const { data, error } = await _supabase.from('users').select('balance, plan').eq('email', userEmail).single();
            if (data && !error) {
                currentBalance = parseFloat(data.balance);
                document.getElementById('mainBalance').innerText = currentBalance.toFixed(2);
                document.getElementById('currentPlan').innerText = data.plan.toUpperCase();
                document.getElementById('userIdentity').innerText = userEmail.split('@')[0];
            }
        }

        async function executeTrade() {
            if (isProcessing) return;

            const plan = document.getElementById('currentPlan').innerText;
            const signal = document.getElementById('signalInput').value.trim().toUpperCase();
            const amount = parseFloat(document.getElementById('investAmount').value);

            // [فحص الباقة الاحترافي]: منع أصحاب الباقات المجانية
            const isFree = plan.includes('FREE') || plan.includes('مجانية') || plan.includes('LOADING') || plan.includes('غير نشط');
            if (isFree) return pushAlert("إجراء مرفوض: لا يوجد عقد استثماري نشط. يرجى ترقية باقتك للوصول لمجمع السيولة.");

            if (!signal) return pushAlert("يجب إدخال كود المصادقة الخاص بالإشارة.");
            if (amount > currentBalance) return pushAlert("السيولة غير كافية لدعم هذا الهامش.");

            isProcessing = true;
            const btn = document.getElementById('tradeBtn');
            const btnText = document.getElementById('tradeBtnText');
            
            btn.classList.add('opacity-70', 'cursor-wait');
            btnText.innerText = "AUTHENTICATING CONTRACT...";

            try {
                // استدعاء وظيفة الربح البرمجية (Database RPC)
                const { data, error } = await _supabase.rpc('claim_signal_profit', {
                    s_code: signal,
                    u_email: userEmail,
                    u_invest: amount
                });

                if (error) throw error;

                pushAlert("تم قبول العقد: جاري تنفيذ استراتيجية التداول لمدة 60 ثانية.", "success");
                
                // تجميد الواجهة لمحاكاة التداول الحقيقي
                setTimeout(() => {
                    pushAlert("تمت العملية بنجاح! تم قيد الأرباح في محفظتك.", "success");
                    syncData();
                    resetBtn();
                }, 4000); // 4 ثوانٍ للعرض (يمكنك تعديلها لـ 60 ثانية)

            } catch (err) {
                pushAlert(err.message || "فشل في المصادقة: الكود غير صحيح أو انتهت صلاحيته.");
                resetBtn();
            }
        }

        function resetBtn() {
            isProcessing = false;
            document.getElementById('tradeBtn').classList.remove('opacity-70', 'cursor-wait');
            document.getElementById('tradeBtnText').innerText = "Authenticate Contract";
            document.getElementById('signalInput').value = "";
        }

        function initBinance() {
            const symbols = ['btc', 'eth', 'sol'];
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker/solusdt@ticker');
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                const s = d.s.toLowerCase().replace('usdt', '');
                const p = parseFloat(d.c);
                const el = document.getElementById(`price-${s}`);
                if (el) {
                    el.innerText = '$' + (p > 1000 ? p.toFixed(2) : p.toFixed(3));
                    el.className = `text-sm font-black font-mono tracking-tighter ${parseFloat(d.P) >= 0 ? 'price-up' : 'price-down'}`;
                }
            };
        }

        function logout() {
            localStorage.clear();
            window.location.replace('index.html');
        }

        window.onload = () => {
            syncData();
            initBinance();
            setInterval(syncData, 15000); // مزامنة البيانات كل 15 ثانية
        };
    </script>
</body>
</html>
