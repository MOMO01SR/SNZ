<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNZ | حسابي الشخصي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; padding-bottom: 90px; padding-top: 20px; min-height: 100dvh; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(6, 182, 212, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); transition: transform 0.3s ease; }
        .cyber-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; color: #06b6d4; font-family: monospace; text-align: center; letter-spacing: 2px;}
        .cyber-input:focus { border-color: #a855f7; outline: none; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .bottom-nav { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        
        /* تأثير النبض الخاص بأيقونة التليجرام */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        .telegram-btn { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body>

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-cyan-500 animate-spin opacity-80"></div>
            <div class="absolute inset-3 rounded-full border-b-2 border-l-2 border-purple-500 animate-[spin_1.5s_reverse_infinite] opacity-60"></div>
            <span class="text-xl font-black text-white tracking-widest z-10">SNZ</span>
        </div>
        <div class="text-[9px] text-cyan-400 font-mono tracking-[0.3em] uppercase animate-pulse">SYNCING NODE DATA...</div>
    </div>

    <div id="toastContainer" class="fixed top-10 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="px-4 mb-6 relative z-10 space-y-4">
        
        <div class="glass-card p-6 border-t-4 border-cyan-500 text-center relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-cyan-500/20 blur-[50px] rounded-full pointer-events-none"></div>
            
            <div class="relative z-10">
                <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-cyan-600 to-purple-600 p-1 mb-3 shadow-[0_0_20px_rgba(6,182,212,0.4)]">
                    <div class="w-full h-full bg-[#020617] rounded-full flex items-center justify-center text-3xl">👨‍💻</div>
                </div>
                <h2 class="text-sm font-black text-white tracking-wider mb-1" id="displayEmail">loading...</h2>
                <p class="text-[9px] text-gray-400 font-mono uppercase tracking-[0.2em] mb-6">SNZ Active Node</p>

                <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                    <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                        <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">رأس المال</p>
                        <p class="text-lg font-black text-cyan-400 font-mono">$<span id="userCapital">0.00</span></p>
                    </div>
                    <div class="bg-black/30 p-3 rounded-xl border border-white/5">
                        <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">إجمالي الأرباح</p>
                        <p class="text-lg font-black text-green-400 font-mono">$<span id="userProfit">0.00</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button class="glass-card p-3 flex flex-col items-center justify-center gap-2 hover:bg-white/5 active:scale-95 transition-all">
                <span class="text-xl">📥</span>
                <span class="text-[9px] font-bold text-gray-300">سجل الإيداع</span>
            </button>
            <button class="glass-card p-3 flex flex-col items-center justify-center gap-2 hover:bg-white/5 active:scale-95 transition-all border-b-2 border-orange-500">
                <span class="text-xl">📤</span>
                <span class="text-[9px] font-bold text-gray-300">سجل السحب</span>
            </button>
            <button class="glass-card p-3 flex flex-col items-center justify-center gap-2 hover:bg-white/5 active:scale-95 transition-all border-b-2 border-purple-500">
                <span class="text-xl">📊</span>
                <span class="text-[9px] font-bold text-gray-300">سجل الصفقات</span>
            </button>
        </div>

        <div class="glass-card p-5 border-r-2 border-purple-500">
            <h3 class="text-xs font-black text-white mb-4 flex items-center gap-2"><span>🔐</span> تغيير كلمة المرور</h3>
            <div class="space-y-3">
                <input type="password" id="oldPass" placeholder="كلمة المرور الحالية" class="w-full cyber-input p-3 rounded-xl text-xs">
                <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" class="w-full cyber-input p-3 rounded-xl text-xs">
                <input type="password" id="confirmPass" placeholder="تأكيد الكلمة الجديدة" class="w-full cyber-input p-3 rounded-xl text-xs">
                <button onclick="changePassword()" id="passBtn" class="w-full bg-purple-600/20 text-purple-400 border border-purple-500/50 hover:bg-purple-600 hover:text-white py-3 rounded-xl text-xs font-bold transition-all mt-2 active:scale-95">
                    تحديث بيانات الدخول
                </button>
            </div>
        </div>

        <div class="glass-card p-5 bg-gradient-to-br from-[#0f172a] to-[#020617]">
            <h3 class="text-xs font-black text-cyan-400 mb-2">عن منصة SNZ</h3>
            <p class="text-[10px] text-gray-400 leading-relaxed">
                نظام ذكي متطور يعتمد على خوارزميات التداول عالي التردد (HFT). نقدم لك بيئة آمنة ومشفرة لتنمية رأس مالك من خلال إدارة المخاطر الآلية.
            </p>
        </div>

        <button onclick="logout()" class="w-full bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white py-4 rounded-2xl text-xs font-black transition-all active:scale-95 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
            تسجيل الخروج من النظام ⎋
        </button>

    </div>

    <a href="https://t.me/Emimy5" target="_blank" class="fixed bottom-24 right-5 w-12 h-12 bg-sky-500 rounded-full flex items-center justify-center text-2xl z-50 telegram-btn text-white transition-transform hover:scale-110">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
    </a>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 z-40 pb-safe">
        <div class="flex justify-around items-center p-3">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">📈</span><span class="text-[9px]">التداول</span>
            </button>
            <button onclick="location.href='plans.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">💼</span><span class="text-[9px]">الباقات</span>
            </button>
            <button onclick="location.href='team.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-all active:scale-90">
                <span class="text-lg">👥</span><span class="text-[9px]">الفريق</span>
            </button>
            <div class="flex flex-col items-center gap-1 text-cyan-400 relative">
                <div class="absolute inset-0 bg-cyan-500/20 rounded-full scale-150 blur-md -z-10 animate-pulse"></div>
                <span class="text-lg drop-shadow-[0_0_8px_rgba(6,182,212,0.8)]">⚙️</span>
                <span class="text-[9px] font-bold">حسابي</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        let userEmail = localStorage.getItem('currentUserEmail');
        let currentDBPassword = ""; // لتخزين كلمة المرور والتحقق منها

        // نظام الإشعارات
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl backdrop-blur-md border shadow-2xl text-[11px] font-bold transform transition-all duration-300 translate-y-[-20px] flex items-center gap-2 ${type === 'success' ? 'bg-cyan-900/90 border-cyan-500 text-cyan-100' : 'bg-red-900/90 border-red-500 text-red-100'}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '🛑'}</span> <span>${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-[-20px]'));
            setTimeout(() => { toast.classList.add('translate-y-[-20px]'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.addEventListener('load', async () => {
            if(!userEmail) { window.location.href = 'login.html'; return; }
            
            document.getElementById('displayEmail').innerText = userEmail;
            await loadAccountData();

            setTimeout(() => {
                document.getElementById('ultimateLoader').style.opacity = '0';
                setTimeout(() => document.getElementById('ultimateLoader').style.display = 'none', 500);
            }, 800);
        });

        // جلب بيانات الرصيد والربح
        async function loadAccountData() {
            try {
                const { data, error } = await _supabase
                    .from('users')
                    .select('balance, profit_today, password')
                    .eq('email', userEmail)
                    .single();

                if (data) {
                    document.getElementById('userCapital').innerText = (data.balance || 0).toFixed(2);
                    document.getElementById('userProfit').innerText = (data.profit_today || 0).toFixed(2);
                    currentDBPassword = data.password; // حفظ كلمة المرور للتحقق
                }
            } catch (err) {
                console.error("Error loading data", err);
            }
        }

        // خوارزمية تغيير كلمة المرور
        async function changePassword() {
            const oldP = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            const confP = document.getElementById('confirmPass').value;
            const btn = document.getElementById('passBtn');

            if(!oldP || !newP || !confP) return showToast("الرجاء تعبئة جميع الحقول", "error");
            if(newP !== confP) return showToast("كلمة المرور الجديدة غير متطابقة", "error");
            if(newP.length < 6) return showToast("يجب أن تتكون الكلمة من 6 رموز على الأقل", "error");
            if(oldP !== currentDBPassword) return showToast("كلمة المرور الحالية غير صحيحة", "error");

            btn.innerText = "جاري التحديث...";
            btn.disabled = true;

            try {
                const { error } = await _supabase
                    .from('users')
                    .update({ password: newP })
                    .eq('email', userEmail);

                if(error) throw error;

                showToast("تم تغيير كلمة المرور بنجاح!", "success");
                currentDBPassword = newP; // تحديث المتغير
                
                // تفريغ الحقول
                document.getElementById('oldPass').value = '';
                document.getElementById('newPass').value = '';
                document.getElementById('confirmPass').value = '';

            } catch (err) {
                showToast("حدث خطأ أثناء التحديث", "error");
            } finally {
                btn.innerText = "تحديث بيانات الدخول";
                btn.disabled = false;
            }
        }

        function logout() { 
            localStorage.removeItem('currentUserEmail'); 
            window.location.href = 'login.html'; 
        }
    </script>
</body>
</html>
