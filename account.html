<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QCT | الدعم المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* منع تمرير الصفحة بالكامل لجعل التمرير داخل الدردشة فقط */
        body, html { height: 100%; overflow: hidden; background-color: #020617; }
        
        /* تنسيقات شريط التمرير للدردشة */
        #chatMessages::-webkit-scrollbar { width: 4px; }
        #chatMessages::-webkit-scrollbar-track { background: transparent; }
        #chatMessages::-webkit-scrollbar-thumb { background-color: rgba(6, 182, 212, 0.3); border-radius: 10px; }
        
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <div id="ultimateLoader" class="fixed inset-0 z-[99999] flex flex-col items-center justify-center bg-[#020617] transition-all duration-700">
        <div class="relative w-24 h-24 flex items-center justify-center mb-8">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-cyan-500 animate-spin opacity-80"></div>
            <div class="absolute inset-3 rounded-full border-b-2 border-l-2 border-purple-500 animate-[spin_1.5s_reverse_infinite] opacity-60"></div>
            <div class="w-10 h-10 bg-cyan-500/20 rounded-full animate-ping absolute"></div>
            <span class="text-xl font-black text-white tracking-widest z-10">QCT</span>
        </div>
        <div class="text-[9px] text-cyan-400 font-mono tracking-[0.3em] uppercase animate-pulse" id="loaderText">CONNECTING TO SUPPORT NODE...</div>
    </div>

    <div id="toastContainer" class="fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div class="p-4 border-b border-white/5 bg-black/40 backdrop-blur-md shadow-lg flex items-center justify-between z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(6,182,212,0.2)]">
                🎧
            </div>
            <div>
                <h2 class="text-white font-black tracking-wide text-sm">الدعم الفني المباشر (SNZ)</h2>
                <p class="text-[9px] text-green-400 font-mono flex items-center gap-1 mt-0.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_5px_#22c55e]"></span> 
                    متصل بقاعدة البيانات
                </p>
            </div>
        </div>
        <button onclick="logout()" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center text-xs border border-red-500/20 hover:bg-red-500/20 transition-colors" title="تسجيل خروج">
            ⎋
        </button>
    </div>

    <div id="chatMessages" class="flex-1 w-full overflow-y-auto p-4 flex flex-col-reverse gap-4 pb-32 z-10">
        <div class="text-gray-500 text-center py-10 font-mono text-[10px] w-full">جاري فحص الاتصال المشفر...</div>
    </div>

    <div class="fixed bottom-[70px] left-0 right-0 p-3 bg-gradient-to-t from-[#020617] via-[#020617]/90 to-transparent z-20">
        <div class="relative flex items-center max-w-2xl mx-auto">
            <input type="text" id="supportInput" placeholder="اكتب رسالتك لمهندس النظام..." class="w-full bg-black/60 border border-cyan-500/30 backdrop-blur-md rounded-full p-3.5 pl-20 text-xs text-white outline-none shadow-[0_0_15px_rgba(0,0,0,0.5)] focus:border-cyan-500 transition-colors">
            
            <button onclick="sendUserMessage()" id="sendBtn" class="absolute left-1.5 top-1/2 -translate-y-1/2 bg-gradient-to-r from-cyan-600 to-cyan-500 hover:from-cyan-500 hover:to-cyan-400 text-white text-[10px] font-black px-5 py-2.5 rounded-full active:scale-95 transition-all shadow-[0_0_10px_rgba(6,182,212,0.3)] flex items-center justify-center">
                إرسال ✈
            </button>
        </div>
    </div>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 z-50 pb-safe bg-[#020617] border-t border-white/5">
        <div class="flex justify-around items-center p-3">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer">
                <span class="text-lg">📈</span><span class="text-[9px]">التداول</span>
            </button>
            <button onclick="location.href='plans.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer">
                <span class="text-lg">💼</span><span class="text-[9px]">الباقات</span>
            </button>
            <button onclick="location.href='team.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer">
                <span class="text-lg">👥</span><span class="text-[9px]">الفريق</span>
            </button>
            
            <button class="flex flex-col items-center gap-1 text-cyan-400 transform transition-transform active:scale-90 relative group cursor-default">
                <div class="absolute inset-0 bg-cyan-500/20 rounded-full scale-150 transition-transform duration-300 -z-10 blur-md"></div>
                <span class="text-lg drop-shadow-[0_0_5px_rgba(6,182,212,0.8)]">🎧</span><span class="text-[9px] font-bold">الدعم</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="config.js"></script>
    <script>
        const isLocalFile = window.location.protocol === 'file:' || window.location.protocol === 'content:';
        let userEmail = localStorage.getItem('currentUserEmail');

        // نظام الإشعارات
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-xl backdrop-blur-md border shadow-2xl text-[11px] font-bold transform transition-all duration-300 translate-y-[-20px] flex items-center gap-2 ${type === 'success' ? 'bg-green-900/90 border-green-500 text-green-100' : 'bg-red-900/90 border-red-500 text-red-100'}`;
            toast.innerHTML = `<span>${type === 'success' ? '✅' : '🛑'}</span> <span>${message}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-[-20px]'));
            setTimeout(() => { toast.classList.add('translate-y-[-20px]'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        window.addEventListener('load', async () => {
            if(!userEmail) {
                if(isLocalFile) userEmail = "architect@local.dev";
                else { window.location.href = 'index.html'; return; }
            }
            
            // تفعيل نظام الاستماع الحي للدردشة فور الدخول
            subscribeToChat();

            // إخفاء شاشة التحميل
            const loader = document.getElementById('ultimateLoader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        });

        // ==========================================
        // محرك الدردشة بالوقت الحقيقي (Supabase Realtime)
        // ==========================================
        
        function subscribeToChat() {
            if(userEmail === "architect@local.dev") {
                renderMessages([{sender: 'user', text: 'مرحباً، هذه رسالة تجريبية من واجهة المطور.', created_at: new Date()}, {sender: 'support', text: 'أهلاً بك يا The Architect. النواة تعمل بكفاءة.', created_at: new Date()}]);
                return;
            }

            // 1. تحميل الرسائل القديمة أولاً
            loadOldMessages();

            // 2. الاستماع للرسائل الجديدة في قاعدة البيانات
            _supabase
                .channel('public:support_messages')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'support_messages', 
                    filter: `user_email=eq.${userEmail}` 
                }, payload => {
                    // حقن الرسالة الجديدة فوراً في الواجهة
                    handleNewIncomingMessage(payload.new);
                })
                .subscribe();
        }

        async function loadOldMessages() {
            const { data, error } = await _supabase
                .from('support_messages')
                .select('*')
                .eq('user_email', userEmail)
                .order('created_at', { ascending: true }); // ترتيب تصاعدي للتاريخ

            if(data) renderMessages(data);
        }

        function handleNewIncomingMessage(message) {
            const container = document.getElementById('chatMessages');
            // إزالة نص "لا توجد رسائل" إذا كان موجوداً
            if(container.querySelector('.text-gray-500')) container.innerHTML = '';

            const msgHtml = createMessageHtml(message);
            // حقن في الأعلى لأننا نستخدم col-reverse (أي الأعلى برمجياً يظهر أسفل الشاشة)
            container.insertAdjacentHTML('afterbegin', msgHtml);
            
            // صوت تنبيه خفيف (اختياري) إذا كانت الرسالة من الدعم
            if(message.sender === 'support') {
                showToast("رسالة جديدة من الدعم الفني", 'success');
            }
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = ''; 
            
            if(messages.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-50 py-10 w-full">
                        <span class="text-4xl mb-2">💬</span>
                        <p class="text-gray-400 text-xs font-mono text-center">لا توجد رسائل سابقة.<br>ابدأ المحادثة الآن مع فريق الدعم.</p>
                    </div>`;
                return;
            }

            // حقن الرسائل (نستخدم afterbegin مع col-reverse لتظهر الأقدم فوق والأحدث تحت)
            messages.forEach(msg => {
                container.insertAdjacentHTML('afterbegin', createMessageHtml(msg));
            });
        }

        function createMessageHtml(msg) {
            const isUser = msg.sender === 'user';
            
            // تنسيق فقاعة الدردشة (Chat Bubble)
            const bubbleBg = isUser 
                ? 'bg-gradient-to-br from-cyan-600 to-cyan-800 text-white rounded-t-2xl rounded-br-2xl' 
                : 'bg-[#111827] border border-purple-500/30 text-gray-200 rounded-t-2xl rounded-bl-2xl';
            
            // محاذاة الرسالة (يمين للمستخدم، يسار للدعم)
            const alignment = isUser ? 'self-start items-start' : 'self-end items-end';
            
            // استخراج الوقت فقط (مثال: 10:30 ص)
            let timeString = '';
            if(msg.created_at) {
                const date = new Date(msg.created_at);
                timeString = date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            }

            return `
                <div class="flex flex-col ${alignment} w-full max-w-[85%] animate-fade-in-up">
                    <span class="text-[9px] ${isUser ? 'text-cyan-400' : 'text-purple-400'} font-bold px-2 mb-1">
                        ${isUser ? 'أنت' : 'المهندس (SNZ)'}
                    </span>
                    <div class="${bubbleBg} p-3.5 shadow-lg relative break-words text-xs leading-relaxed w-full">
                        ${msg.text}
                    </div>
                    <span class="text-[8px] text-gray-500 mt-1 px-1 font-mono">${timeString}</span>
                </div>
            `;
        }

        // إرسال رسالة من المستخدم لقاعدة البيانات
        async function sendUserMessage() {
            const input = document.getElementById('supportInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();

            if(!text) return;
            if(userEmail === "architect@local.dev") return showToast("وضع المطور: الاتصال معطل", 'error');

            input.disabled = true;
            btn.innerHTML = '<span class="animate-spin inline-block">⏳</span>';

            try {
                const { error } = await _supabase.from('support_messages').insert([{
                    user_email: userEmail,
                    text: text,
                    sender: 'user'
                }]);

                if(!error) {
                    input.value = ''; 
                } else { throw error; }
            } catch(e) {
                showToast("فشل إرسال الرسالة، تحقق من اتصالك.", 'error');
            } finally {
                input.disabled = false;
                btn.innerHTML = 'إرسال ✈';
                input.focus();
            }
        }

        document.getElementById('supportInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendUserMessage();
        });

        function logout() { 
            localStorage.removeItem('currentUserEmail'); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
